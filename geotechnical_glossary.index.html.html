<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Геотехникийн Тайлбар Толь</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+Mongolian&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #161b27;
    --card: #1c2333;
    --border: #2a3347;
    --accent: #e8a020;
    --accent2: #5b9bd5;
    --text: #d4dae8;
    --muted: #7a8899;
    --tag-en: #1a3a5c;
    --tag-mn: #3a2a0a;
    --highlight: rgba(232,160,32,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif', Georgia, serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #0a0d14 0%, #12192a 60%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 40px 32px 32px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(91,155,213,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 20% 20%, rgba(232,160,32,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
  }
  .header-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(232,160,32,0.3);
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: clamp(26px, 4vw, 42px);
    font-weight: 700;
    line-height: 1.15;
    color: #f0f4ff;
    margin-bottom: 8px;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    font-size: 15px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 28px;
  }
  .stats-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .stat {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .stat strong { color: var(--accent2); font-size: 18px; display: block; }

  /* ── Controls ── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .controls-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 240px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
  }
  input[type=search] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px 10px 38px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input[type=search]:focus { border-color: var(--accent); }
  input[type=search]::placeholder { color: var(--muted); }

  .dir-toggle {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .dir-btn {
    padding: 10px 16px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .dir-btn.active {
    background: var(--accent);
    color: #0a0d14;
    font-weight: 600;
  }

  .sort-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
  }

  .result-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    padding: 0 4px;
  }

  /* ── Main ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 32px 60px;
  }

  /* ── Alpha index ── */
  .alpha-index {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 24px;
  }
  .alpha-btn {
    width: 32px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .alpha-btn:hover { border-color: var(--accent); color: var(--accent); }
  .alpha-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0d14; }

  /* ── Letter group ── */
  .letter-group { margin-bottom: 8px; }
  .letter-heading {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    padding-top: 8px;
  }
  .letter-char {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    min-width: 28px;
  }
  .letter-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  /* ── Entry card ── */
  .entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 22px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.18s, transform 0.12s, box-shadow 0.18s;
    position: relative;
  }
  .entry:hover {
    border-color: rgba(232,160,32,0.4);
    transform: translateX(3px);
    box-shadow: -3px 0 0 var(--accent), 0 4px 20px rgba(0,0,0,0.3);
  }
  .entry.expanded {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--card) 0%, rgba(232,160,32,0.04) 100%);
  }
  .entry-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    flex-wrap: wrap;
  }
  .term-en {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: #c8d8f0;
    flex: 1;
    min-width: 180px;
  }
  .term-mn {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    flex: 1;
    min-width: 180px;
    text-align: right;
  }
  .entry-def {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed rgba(255,255,255,0.08);
    font-size: 14px;
    line-height: 1.75;
    color: #a8b8cc;
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .entry.expanded .entry-def { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 600;
  }
  .tag-en { background: var(--tag-en); color: #7ab3e0; border: 1px solid #2a4d7a; }
  .tag-mn { background: var(--tag-mn); color: #e8a020; border: 1px solid #5a3a0a; }

  .copy-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    padding: 4px 8px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .entry:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: var(--accent); color: #0a0d14; border-color: var(--accent); }
  .copy-btn.copied { background: #1a4a2a; color: #5be098; border-color: #2a6a3a; opacity: 1; }

  /* ── No results ── */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    display: none;
  }
  .no-results svg { opacity: 0.3; margin-bottom: 16px; }
  .no-results p { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    text-align: center;
    padding: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Highlight match */
  mark {
    background: rgba(232,160,32,0.25);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  @media (max-width: 600px) {
    header, .controls, main { padding-left: 16px; padding-right: 16px; }
    .term-mn { text-align: left; }
    .copy-btn { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-badge">Геотехникийн Тайлбар Толь • Geotechnical Glossary</div>
    <h1>Геотехникийн<br><span>Нэр Томьёоны Толь</span></h1>
    <p class="subtitle">Geotechnical Engineering Bilingual Dictionary — Англи ↔ Монгол</p>
    <div class="stats-row">
      <div class="stat"><strong id="totalCount">250</strong>Нэр томьёо</div>
      <div class="stat"><strong>2</strong>Хэл</div>
      <div class="stat"><strong>100%</strong>Тайлбартай</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="searchInput" placeholder="Англи эсвэл монгол үгээр хайх…" autocomplete="off">
    </div>
    <div class="dir-toggle">
      <button class="dir-btn active" data-dir="both">Бүгд</button>
      <button class="dir-btn" data-dir="en">EN→МН</button>
      <button class="dir-btn" data-dir="mn">МН→EN</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="en-asc">A–Z (Англи)</option>
      <option value="mn-asc">А–Я (Монгол)</option>
    </select>
    <span class="result-count" id="resultCount"></span>
  </div>
</div>

<main>
  <div class="alpha-index" id="alphaIndex"></div>
  <div id="glossaryContainer"></div>
  <div class="no-results" id="noResults">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      <path d="M8 11h6M11 8v6" stroke-dasharray="2 2"/>
    </svg>
    <p>Хайлтын үр дүн олдсонгүй</p>
    <p style="margin-top:8px;opacity:0.6">No results found</p>
  </div>
</main>

<footer>
  Геотехникийн Тайлбар Толь — 250 нэр томьёо · Geotechnical Glossary
</footer>

<script>
const DATA = [{"en":"plane strain","mn":"хавтгай хэв гажилт","definition":"Зөвхөн хоёр чиглэлд деформац үүсч, гурав дахь чиглэлд өөрчлөлтгүй нөхцөл."},{"en":"plane stress","mn":"хавтгайн хүчдэл","definition":"Зөвхөн хоёр чиглэлд стресс үйлчилж, гурав дахь чиглэлд стресс ~0 гэж үздэг."},{"en":"planes of weakness","mn":"сулралын хавтгайнууд","definition":"Хагарал, ан цав, давхарга зэрэг бат бэх багатай бүтэц."},{"en":"planned subsidence","mn":"төлөвлөсөн суулт","definition":"Уурхайн ашиглалт эсвэл инженерийн ажилд зориуд тооцсон суулт."},{"en":"plastic deformation","mn":"уян налархай хэв гажилт","definition":"Ачаалал авч, буцахгүй байнгын хэлбэрийн өөрчлөлт."},{"en":"plastic equilibrium","mn":"уян налархай тэнцвэр","definition":"Материал бүх чиглэлд хуванцар төлөвт шилжсэн тогтвортой байдал."},{"en":"plastic flow","mn":"уян налархай урсгал","definition":"Материал даралтад урсах мэт удаанаар хэлбэрээ алдах үзэгдэл."},{"en":"plastic limit","mn":"уян налархай хязгаар","definition":"Материал хуванцар төлөвт орж эхлэх хамгийн бага чийг/ачааллын утга."},{"en":"plastic potential","mn":"уян налархай чадамж","definition":"Хуванцар деформацын чиглэлийг тодорхойлох математик функц."},{"en":"plastic range","mn":"уян налархай хүрээ","definition":"Материалын ачаалал–деформацын муруйн хуванцар бүс."},{"en":"plastic strain","mn":"уян харимхай хэв гажил","definition":"Буцааж нөхөгдөхгүй байнгын деформац."},{"en":"plastic strata","mn":"уян налархай үелэл","definition":"stress threshold-ийг давсан үед irreversible deformation хийдэг, rock mass эсвэл soil layer-д strain localized болох, creep эсвэл progressive failure-д оролцдог хэсэг юм."},{"en":"plastic zone","mn":"уян налархай бүс","definition":"stress нь yield stress-г давсан үед rock, soil, or structural element-д irreversible deformation үүсдэг, failure plane-ийг үүсгэх эсвэл stress redistribution-д оролцдог бүс юм."},{"en":"plasticity","mn":"уян налархай","definition":"stress > yield stress үед материал урт хугацааны deformation-д орж, original shape-ээ буцааж авахгүй байх шинж юм."},{"en":"plasticity chart","mn":"уян налархайн диаграм","definition":"liquid limit (LL) ба plastic limit (PL)-ийг ашиглан soil-ийн plasticity index (PI) ба clay content, compressibility, swell potential-г тодорхойлдог."},{"en":"plasticity index","mn":"уян налархайн индекс","definition":"soil-ийн plastic range буюу stress-д өртөж permanent deformation хийх чадварын өргөн-ийг илэрхийлнэ."},{"en":"plasticity modulus","mn":"уян налархайн модуль","definition":"материал эсвэл хөрсний plastic (байнгын) деформацад орох үед shear stress ба shear strain-ийн харьцааг илэрхийлэх модуль юм."},{"en":"point load","mn":"цэгэн ачаалал","definition":"Нэг цэг дээр төвлөрсөн ачаалал."},{"en":"point load index","mn":"цэгэн ачааллын индекс","definition":"Чулуулаг хатуулаг, бат бэхийн орлуулсан үзүүлэлт."},{"en":"point load strength","mn":"цэгэн ачааллын эсэргүүцэл","definition":"чулуулгын дээжинд point load туршилт хийхэд хагарах цэгт шаардлагатай хүчийг ашиглан тодорхойлсон бат бэх юм."},{"en":"point load test","mn":"цэгэн ачааллын туршилт","definition":"чулуулгын бат бэхийг хурдан тодорхойлох геотехникийн туршилт юм."},{"en":"point of application","mn":"үйлчлэх цэг","definition":"хүч (force) бодитоор биет дээр хаана үйлчилж байгааг тодорхойлсон цэг юм."},{"en":"point of inflection","mn":"тэнхлэгийн цэг","definition":"муруй график эсвэл curve дээр муруй чиглэл нь эерэгээс сөрөг буюу сөргөөс эерэг рүү шилжих цэг юм."},{"en":"polyaxial stress","mn":"олон тэнхлэгт хүчдэл","definition":"Олон тэнхлэгт хүчдэл гэдэг нь биетэд нэгээс олон чиглэлд зэрэг үйлчилж буй хүчдэлийг хэлнэ."},{"en":"pore elasticity","mn":"нүх сүвийн уян харимхай","definition":"сүвийн уян чанар гэдэг нь чулуулаг эсвэл хөрсөн доторх сүвийн эзлэхүүн даралт өөрчлөгдөхөд уянгаар өөрчлөгдөх чадвар юм."},{"en":"pore pressure","mn":"нүх сүвийн даралт","definition":"чулуулаг, хөрсний сүв доторх ус эсвэл хийнээс үүсэх даралт юм."},{"en":"pore pressure dissipation","mn":"нүх сүвийн даралтын бууралт","definition":"сүв доторх илүүдэл даралт ус гадагш урсах явцад багасах үзэгдэл юм."},{"en":"pore water head","mn":"нүх сүвийн усны дээд түвшин","definition":"сүвийн усны даралтыг илэрхийлэх усны баганын өндөр юм."},{"en":"pore water pressure","mn":"нүх сүвийн усны даралт","definition":"хөрсний нүх сүв доторх уснаас үүссэн даралт юм."},{"en":"porosity","mn":"нүх сүв","definition":"чулуулаг эсвэл хөрсөн доторх хоосон зай буюу сүвийн эзлэх хувийг хэлнэ."},{"en":"porous medium","mn":"нүх сүвийн орчин","definition":"шингэн, хий нэвтрүүлэх чадвартай сүвэрхэг бүтэцтэй орчин юм."},{"en":"post-failure behaviour","mn":"нурлын дараах шинж чанар","definition":"материал эвдэрсний дараах деформаци болон бат бөхийн өөрчлөлтийн төлөв юм."},{"en":"post-peak curve","mn":"хожуу-оргилын муруй","definition":"материалын бат бөх дээд цэгтээ хүрсний дараах деформацийн зан төлөвийг харуулсан муруй юм."},{"en":"pre-loading","mn":"урьдчилсан ачаалал","definition":"хөрс эсвэл суурь дээр барилга барихын өмнө урьдчилан даралт өгөх замаар суулт болон бат бөхийг тогтворжуулах арга юм."},{"en":"pre-split blasting","mn":"доргиох тэсэлгээ","definition":"чулуулгийг хяналттайгаар урьдчилан ан цав гаргаж, дараагийн тэсэлгээний нөлөөг хязгаарлах арга юм."},{"en":"pressure arch","mn":"даралтын арк","definition":"чулуулгийн дээд хэсэгт даралт тархаж, нүхний дээврийг \"арк\" хэлбэрээр дэмждэг үзэгдэл юм."},{"en":"pressure buildup","mn":"даралтын өсөлт","definition":"Нүх сүв доторх шингэн эсвэл хийний даралт урт хугацаанд нэмэгдэж хуримтлагдах үзэгдэл юм."},{"en":"pressure distribution","mn":"даралтын тархалт","definition":"материал дотор даралт нэгэн жигд биш, янз бүрийн хэсэгт ялгаатай байдлаар тархаж буй төлөв юм."},{"en":"pressure gauge","mn":"даралт хэмжигч","definition":"систем доторх даралтыг тооцоолох багаж юм."},{"en":"pressure gradient","mn":"даралтын зөрөө","definition":"даралт зайд харьцангуй хэр хурдан өөрчлөгдөж байгааг илэрхийлдэг."},{"en":"pressure line","mn":"даралтын шугам","definition":"даралт урсгал, шингэн эсвэл хий дотор хэрхэн өөрчлөгдөж байгааг дүрсэлсэн шугам юм."},{"en":"pressure peak","mn":"даралын орой","definition":"систем доторх даралт хамгийн өндөр болсон цэг буюу дээд цэг юм."},{"en":"pressure transducer","mn":"даралт өөрчлөгч","definition":"даралтыг хэмжиж, түүний хүчийг цахилгаан сигнал (вольт, амплитуд) болгож өгдөг төхөөрөмж юм."},{"en":"pressure-void ratio curve","mn":"даралт-нүх сүвийн харьцааны муруй","definition":"даралт ба материалын нүх сүвний эзлэхүүний (void ratio) харилцааг графикаар дүрсэлсэн муруй юм."},{"en":"primary permeability","mn":"анхдагч нэвчилт","definition":"хөрс, чулуулгын нүх сүв дотроор шингэн урсах анхны чадвар, бүтэц өөрчлөгдөөгүй үед хэмжигдсэн нэвчилт юм."},{"en":"primary stress","mn":"анхдагч хүчдэл","definition":"материалд гаднаас нэмж ачаалал өгөхөөс өмнө, байгалийн байдлаар орших дотоод хүчдэл юм."},{"en":"principal axes","mn":"гол тэнхлэг","definition":"stress tensor-д ямар ч сөрөг shear stress (катал хүч) үйлчилдэггүй гол тэнхлэгүүд юм. Өөрөөр хэлбэл, эдгээр тэнхлэгүүдээр үйлчлэх хүчдэл зөвхөн нормаль (normal stress) байдаг."},{"en":"principal strain","mn":"үндсэн хэв гажил","definition":"материалд shear буюу эргэлтийн хүч үйлчилдэггүй чиглэлд үүссэн хамгийн их эсвэл хамгийн бага суналт/шахалт юм."},{"en":"principal stress","mn":"үндсэн хүчдэл","definition":"материалд shear stress үйлчилдэггүй гол тэнхлэгүүдийн нормаль хүчдэл юм."},{"en":"principle of effective stress","mn":"ашигч хүчдэлийн үндэс","definition":"үр нөлөөт хүчдлийн зарчим гэдэг нь хөрс эсвэл чулуулгийн нийт хүчдэл нь сүвийн усны даралтаас хамааралтайг тайлбарласан зарчим юм."},{"en":"principle of superimposition","mn":"давхраадалтын үндэс","definition":"Хэрэв биед нэгээс олон ачаалал зэрэг үйлчилж байгаа бол нийт стресс ба деформаци нь тус бүрийн ачааллын нөлөөгөөр шууд нэмэгдэнэ гэсэн зарчим"},{"en":"progressive failure","mn":"үргэлжилсэн нурал","definition":"эхлээд жижиг хэсгүүд эвдэрч, дараа нь бусад хэсгүүд дарааллаар эвдрэн, эцэстээ нийт систем нурах процесс юм."},{"en":"proportion of strain","mn":"хэв гажлын харьцаа","definition":"деформацийн хэмжээ анхны хэмжээ гэсэн харьцаа бөгөөд ихэвчлэн хувиар буюу хувь (%) илэрхийлдэг."},{"en":"pseudo-plastic","mn":"хуурамч-уян налархай","definition":"шингэн эсвэл бусад материал хүч нэмэгдэхэд урсаж байгаа мэт аашилдаг боловч бүрэн уян бус, харин хүч нэмэгдэхэд урсгалын эсэргүүцэл өөрчлөгдөнө."},{"en":"pulling test","mn":"татах туршилт","definition":"Таталтын бат бэх тодорхойлох туршилт."},{"en":"pulsating stress","mn":"доргилтот хүчдэл","definition":"материалд тогтмол биш, давтамжтайгаар өөрчлөгдөж буй хүчдэл юм."},{"en":"quick shear test","mn":"түргэвчилсэн шилжээсийн туршилт","definition":"хөрсийг жижиг хэсгээр авч, хурдан хугацаанд shear stress–shear strain-ийг хэмжиж бат бэхийг тодорхойлдог туршилт юм."},{"en":"radial displacement","mn":"радиал шилжилт","definition":"материалын төвөөс гадаргуу руу чиглэсэн шилжих урт эсвэл деформац юм."},{"en":"radial shear","mn":"радиал шилжээс","definition":"материалд төвөөс гадаргуу руу чиглэсэн shear stress буюу зүсэлтийн хүч юм."},{"en":"radial strain","mn":"радиал хэв гажил","definition":"материалын радиаль чиглэлд үүссэн деформацийн хэмжээ анхны хэмжээ гэж тодорхойлогддог."},{"en":"radial stress","mn":"радиал хүчдэл","definition":"материалд радиаль чиглэлд буюу төвөөс гадаргуу руу эсвэл гадаргуунаас төв рүү чиглэсэн хүчдэл юм."},{"en":"range of measurement","mn":"хэмжилтийн далайц","definition":"багаж ашиглаж болох хамгийн бага ба хамгийн их утгын хязгаар юм."},{"en":"rate of loading","mn":"даралтын өсөлтийн хурд","definition":"stress эсвэл load цаг хугацаанд хэр хурдан өөрчлөгдөж байгааг тодорхойлдог."},{"en":"ratio of stress to strength","mn":"хүчдэл бат бөхийн харьцаа","definition":"материалд үйлчлэх хүчдлийг тухайн материалын бат бөх дээр хуваасан харьцаа юм."},{"en":"recompression","mn":"дахин нягтруулах","definition":"материал дахин ачаалалд өртөж, өмнөх суулттай харьцуулахад бага хэмжээгээр шахагдаж нягтардаг явдал юм."},{"en":"redistribution of stresses","mn":"хүчдэлийн дахин тархалт","definition":"хүчдэл материал дотор дахин тархаж, зарим хэсгүүдэд ихэсч, заримд багасдаг үзэгдэл юм."},{"en":"reduction of load","mn":"ачааллын бууралт","definition":"материалд эсвэл бүтэцт өгөх ачааллыг багасгаж, стресс болон деформацийг бууруулах арга хэмжээ юм."},{"en":"reinforcement","mn":"хүчитгэл","definition":"материалд нэмэлт хүч тэсвэрлэх чадвар бий болгох, эвдрэлээс хамгаалах арга юм."},{"en":"relative density","mn":"харьцангуй нягт","definition":"loose (сул) ба dense (хатуу) байдалд харьцуулж хөрсний нягтралын хэмжээг хувь (%)-аар илэрхийлсэн үзүүлэлт юм."},{"en":"relative permeabilty","mn":"харьцангуй нэвчүүлэлт","definition":"материал доторх нэг шингэн (жишээ нь ус) нэвчих чадварыг тухайн сүв дүүргэлтийн нөхцөлд бусад шингэн (жишээ нь тос) оролцоотой харьцуулсан харьцаа юм."},{"en":"relaxation method","mn":"сулруулах арга","definition":"материал, бүтцийн стрессийг аажмаар багасгаж, эвдрэлээс сэргийлэх замаар тогтворжуулах тооцооны арга юм."},{"en":"relaxation of stress","mn":"хүчдэлийн сулрал","definition":"материал (ихэвчлэн уян, полимер эсвэл шавар зэрэг viscoelastic материал) ачаалал доор байх үед дотоод хүчдэл нь цаг хугацааны явцад буурдаг процесс юм."},{"en":"representative elemental volume (REV)","mn":"төлөөлөх элемент эзлэхүүн","definition":"REV гэдэг нь poroelastic буюу porous medium-ийн материалд хамгийн жижиг хэмжээг сонгосон ч тэр нь нийт системийн дундаж шинж чанарыг илэрхийлэх хэмжээ юм."},{"en":"residual deformation","mn":"үлдэгдэл хэв гажилт","definition":"stress эсвэл load авч, дараа нь чөлөөлөгдсөний дараа материалд үлдсэн \"босохгүй\" деформац юм."},{"en":"residual strain energy","mn":"үлдэгдэл хэв гажлын энерги","definition":"Residual strain energy нь stress–strain процессын дараа материалд үлдсэн энерги, ямар нэгэн механик ажилд шилжих боломжтой үзүүлэлт юм."},{"en":"residual strength","mn":"үлдэгдэл эсэргүүцэл","definition":"материал эвдрэлтийн дараа, shear stress эсвэл нормаль stress-ийг тэсвэрлэх чадвар юм."},{"en":"residual stress","mn":"үлдэгдэл хүчдэл","definition":"stress буюу хүчдэл материалд үүссэн ч гаднаас ачаалал авч байх үед бусад хэсгүүдийн дэмжлэг, thermal expansion, plastic deformation зэрэг нөлөөллөөс үлдсэн дотоод хүчдэл юм."},{"en":"resistance to alternating load","mn":"хувьсах хүчний эсэргүүцэл","definition":"material fatigue-тэй холбоотой үзүүлэлт бөгөөд материал хэр удаан хугацаанд давтамжит ачааллыг тэсвэрлэхийг тодорхойлдог юм."},{"en":"resistance to penetration","mn":"нэвчилтийн эсэргүүцэл","definition":"шингэн, хөрс, элс, шавар, чулуулгад шураг, rod, cone зэрэг багаж нэвтрэхэд үзүүлж буй эсэргүүцэл юм."},{"en":"resistance to torsion","mn":"мушгилтын эсэргүүцэл","definition":"материалд torsional stress буюу эргэлтийн хүч үйлчилж байхад материал хугарах, гулзайхгүй тэсвэрлэх чадвар-ыг илэрхийлдэг."},{"en":"resistance to yield","mn":"урсалтын эсэргүүцэл","definition":"stress хэмжээ нь материалын elastic limit буюу yield point хүртэл тэсвэрлэх чадвар юм."},{"en":"resistance-yield curve","mn":"эсэргүүцэл-урсалтын муруй","definition":"stress–strain график шиг, материал хэр их ачааллыг тэсвэрлэх ба ямар хугацаанд plastic deformation эхлэхийг харуулдаг."},{"en":"reverse bending test","mn":"хариу тахийлтын туршилт","definition":"материалд нэг чиглэлд гулзайлт өгч, дараа эсрэг чиглэлд гулзайлт өгч давтамжит циклийг давтан хийж fatigue resistance-г тодорхойлох туршилт юм."},{"en":"reversible deformation","mn":"харимхай хэв гажилт","definition":"stress elastic limit буюу yield point хүртэл материалд үүссэн деформац бөгөөд хүч суллахад материал бүрэн сэргээдэг юм."},{"en":"rheological behaviour","mn":"реологийн шинж чанар","definition":"материалын stress–strain–time харилцаанд суурилсан зан байдал, үүнд уян, пластик, вискоэластик шинж чанар орно."},{"en":"rheological model","mn":"реологийн загвар","definition":"материалын viscoelastic, viscoplastic, creep, stress relaxation зэрэг зан байдлыг дүрслэх математик эсвэл механик загвар юм."},{"en":"rheology","mn":"реологи, урсгал судлал","definition":"материал ямар хэмжээнд ачаалалд урсаж, сунан, шахагдахыг, мөн цаг хугацааны явцад хэрхэн хариу үйлдэл үзүүлж байгааг судална."},{"en":"rigid block","mn":"хатуу блок","definition":"stress-д өртөхөд хэлбэрээ өөрчилдөггүй, зөвхөн байрлал эсвэл чиглэлээ өөрчилж хөдөлдөг гэж тооцдог математик/механик ойлголт юм."},{"en":"rigidity","mn":"хөшүүн чанар","definition":"stress-д өртөхөд материал хэр \"хатуу\" эсвэл \"урт хугацаанд хэлбэрээ хадгалах\" чадвартай байгааг харуулна."},{"en":"ring shear apparatus","mn":"шилжээсийн цагираган төхөөрөмж","definition":"материалд shear stress удаан хугацаанд буюу олон удаа өгөх замаар residual shear strength, post-peak behavior-г судлах боломжтой."},{"en":"rock","mn":"чулуулаг","definition":"Earth-ийн lithosphere-д олддог хатуу, бат бөх материал бөгөөд геотехникийн, барилга, уул уурхай, эрчим хүчний салбарт ашиглагддаг."},{"en":"rock block","mn":"чулуулгийн блок","definition":"харьцангуй тогтвортой, хэлбэрээ хадгалсан чулуулгийн хэсэг бөгөөд slope, tunnel, rockfill, foundation analysis-д ашиглагддаг."},{"en":"rock bridge","mn":"чулуулгийн ан цавын тасалдал","definition":"slope, cliff эсвэл joint fault-т эвдэрсэн чулуулгын хоорондох \"гүүр\" буюу intact rock хэсэг бөгөөд эвдрэл нурах магадлалд нөлөөлдөг."},{"en":"rock burst","mn":"чулуулгийн задрал","definition":"чулуулаг дотор хуримтлагдсан стресс гэнэт сулрах үед хүчтэй хөдөлгөөн, чулуулаг шидэгдэх, эвдрэл үүсэх үзэгдэл юм."},{"en":"rock creep","mn":"чулуулгийн нуранги","definition":"stress elastic limit-ээс бага хэмжээтэй боловч хугацааны явцад материал аажмаар сунжиж, шахагдах процесс юм."},{"en":"rock cutting","mn":"чулуулгийг зүсэх","definition":"excavation, mining, tunneling-д ашигладаг процесс бөгөөд чулуулагт даралт, эргэлт, шок эсвэл тэсрэлт ашиглан материал салгах үйлдлийг хэлдэг."},{"en":"rock discontinuity","mn":"чулуулгийн тасрал","definition":"rock mass-д stress redistribution үүсгэх, эвдрэлд амархан өртөх, fluid flow болон deformation-д нөлөөлөх бие даасан plane эсвэл surface юм."},{"en":"rock dynamics","mn":"чулуулгийн динамик","definition":"explosion, seismic waves, rock burst, blasting, vibration-т чулуулга хэрхэн хариу үйлдэл үзүүлж, stress redistribution болон failure үүсгэхийг судална."},{"en":"rock engineering","mn":"чулуулгийн инженер","definition":"rock mechanics, rock mass classification, excavation, support design, slope stability, rock dynamics зэрэг ойлголтыг нэгтгэн практик инженерийн шийдэл гаргадаг салбар юм."},{"en":"rock engineering systems (RES)","mn":"чулуулгийн инженерийн систем","definition":"rock mass-ийг судлах, туннель, slope, dam, mining excavation-д зориулан risk assessment, support design, monitoring хийхэд зориулсан системчилсэн ойлголт, аргачлал юм."},{"en":"rock failure","mn":"чулуулгийн эвдрэл","definition":"stress, strain, discontinuities, pore pressure, environmental factors зэрэг нөлөөллөөс болж rock mass эвдрэх процесс юм."},{"en":"rock failure criterion","mn":"чулуулгийн эвдрэлийн шалгуур","definition":"stress state, rock strength, discontinuities-г харгалзан material хэр хурдан эсвэл ямар нөхцөлд эвдрэхийг тодорхойлдог шалгуур юм."},{"en":"rock fracture mechanics","mn":"Чулуулгийн ан цавын механик","definition":"crack initiation, propagation, interaction of discontinuities, and failure mechanisms-г rock mass-д тайлбарлаж, эвдрэл, rock burst, slope failure-г урьдчилан тооцох зорилготой."},{"en":"rock fracutre toughness","mn":"чулуулгийн ан цавын хат","definition":"материалд stress concentration үүссэн үед crack эхлэх ба тархахад хэр их energy буюу stress шаардлагатайг илэрхийлдэг механик үзүүлэлт юм."},{"en":"rock joint","mn":"чулуулгийн ан цав","definition":"rock mass-д stress redistribution үүсгэж, block formation, deformation, fluid flow-д нөлөөлөх plane юм."},{"en":"rock mass","mn":"чулуулгийн массив","definition":"individual rock blocks болон тэдгээрийн хоорондох discontinuities-г багтаасан, stress-д хэрхэн хариу үйлдэл үзүүлж, deformation болон failure-ийг тодорхойлдог нэгж юм."},{"en":"rock mass classification","mn":"чулуулгийн массивийн ангилал","definition":"rock mass-д stress-д хэрхэн хариу үйлдэл үзүүлэх, excavation-д ямар support хэрэгтэйг тодорхойлох зорилготой системчилсэн аргачлал юм."},{"en":"rock mass quality classification","mn":"чулуулгийн массивийн чанарын ангилал","definition":"tunnel, slope, dam, foundation-д rock mass хэр сайн эсвэл сул байгааг тодорхойлох аргачлал бөгөөд quality-д нь rock strength, discontinuities, block size, groundwater зэрэг хүчин зүйлс орно."},{"en":"rock mass strength","mn":"чулуулгийн массивийн бат бэх","definition":"intact rock properties, discontinuities, joints, faults, groundwater, in-situ stress зэрэг бүх хүчин зүйлсийг нэгтгэсэн rock mass-д stress эсэргүүцэх чадвар юм."},{"en":"rock mass structure","mn":"чулууулгийн массивийн структур","definition":"rock blocks, joints, faults, layering, fractures-ийг нэгтгэсэн бүтцийг харуулж, rock mass-ийн mechanical behavior, stability, stress redistribution-д нөлөөлдөг."},{"en":"rock mechanics","mn":"чулуулгийн механик","definition":"rock mass болон intact rock-ийн mechanical properties, rock failure, stress redistribution, deformation behavior-г ойлгож, инженерийн шийдэл гаргахад ашигладаг."},{"en":"rock pressure","mn":"чулуулгийн даралт","definition":"tunnel lining, underground excavation, slope face-д rock mass-аас учирч буй ачаалал буюу lateral, vertical stress-ийг хэмжих үзүүлэлт юм."},{"en":"rock slide","mn":"чулуулгийн гулсалт","definition":"slope stability-г алдагдуулж, cliff эсвэл slope-аас rock block эсвэл mass-г гулсуулан унагадаг геотехникийн эвдрэл юм."},{"en":"rock slip","mn":"чулуулаг гулсах","definition":"rock slide-ийн нэгэн төрөл боловч гол нь shear plane буюу weak plane дагуу хөдөлж, бага хэмжээний хөдөлгөөнтэй эсвэл localized гулсалт үүсдэг үзэгдэл юм."},{"en":"rock strength","mn":"чулуулгийн бат бэх","definition":"intact rock болон rock mass-ийн stress-д тэсвэрлэх механик шинж чанар, failure point буюу эвдрэх нөхцөлийг тодорхойлдог үзүүлэлт юм."},{"en":"rock support","mn":"чулуулгийн бэхэлгээ","definition":"excavation-д rock mass stability-г хадгалах, deformation багасгах, эвдрэлээс урьдчилан сэргийлэх арга юм."},{"en":"rock test cell","mn":"чулуулаг туршилтын камер","definition":"stress, strain, pore pressure, deformation, permeability-г хянаж, rock mechanics туршилт хийх зориулалттай confined space буюу chamber юм."},{"en":"rockbolt","mn":"чулуулгийн болт","definition":"excavation-д rock mass stability-г нэмэгдүүлж, joint plane дагуу block movement-г хянах, deformation багасгах зориулалттай барилгын элемент юм."},{"en":"rotational slip","mn":"тойрог гулсалт","definition":"slope stability-г алдагдуулж, rock mass эсвэл soil mass нь өөрийн төвөөс эргэх маягаар гулсах үзэгдэл юм."},{"en":"roughness","mn":"адраашил","definition":"rock joint, discontinuity, excavation surface эсвэл rock support contact-д friction ба shear behavior-д нөлөөлөх surface property юм."},{"en":"roughness coefficient","mn":"адраашлын зэрэг","definition":"joint plane эсвэл discontinuity дээр shear stress-д friction ба interlocking-ийг тодорхойлдог параметр юм."},{"en":"rupture curve","mn":"хагарлын муруй","definition":"stress нэмэгдэхэд материал хэрхэн деформац үүсгэж, ultimate strength-д хүрэх, гэнэт эсвэл аажмаар failure-д орохыг харуулдаг график юм."},{"en":"rupture envelope","mn":"хагарлын хүрээ","definition":"stress state хэрхэн rock-д failure үүсгэж болохыг stress plane дээр харуулдаг boundary, үүний дотор rock stable, үүнээс гадна rock эвдэрнэ гэсэн үзүүлэлттэй."},{"en":"safety factor","mn":"аюулгүйн итгэлцүүр","definition":"system failure үүсэх магадлал, аюулгүй байдлыг тооцох инженерийн хэмжигдэхүүн бөгөөд өндөр FS → system илүү аюулгүй, бага FS → failure-д ойрхон гэж үздэг."},{"en":"saturated unit weight","mn":"усаар ханасан нэгж жин","definition":"soil/rock-д water fills all voids, pore spaces-д орсон үед тухайн материалын unit weight буюу density-г тодорхойлдог механик үзүүлэлт юм."},{"en":"scalar","mn":"скаляр","definition":"зөвхөн magnitude буюу хэмжээтэй, vector шиг чиглэлгүй физик тоо юм."},{"en":"scale effect","mn":"масштабын нөлөө","definition":"laboratory болон field-той туршилтын үр дүнг харьцуулахад, rock/soil sample-ын хэмжээ ихсэх тусам strength, deformability, fracture behavior өөрчлөгдөж болохыг харуулдаг ойлголт юм."},{"en":"scale factor","mn":"масштабын хүчин зүйл","definition":"model-prototype буюу laboratory model болон field rock mass эсвэл slope, tunnel-ын бодит хэмжээний харьцааг тодорхойлдог параметр юм."},{"en":"scale model","mn":"жижигрүүлсэн загвар","definition":"Scale model нь laboratory, field test, simulation-д бодит объектын (tunnel, slope, dam, rock mass) mechanical behavior, stability-г судлах зориулалттай scaled-down буюу scaled-up model юм."},{"en":"sclerometer","mn":"склерометр","definition":"Sclerometer нь материалд localized stress өгөх замаар scratch, indentation, rebound-ийг хэмжиж hardness буюу mechanical strength-ийн шинж чанарыг тодорхойлдог багаж юм."},{"en":"scratch hardness","mn":"зурагдах хатуулаг","definition":"чулуулаг, металл, бетон зэрэг материалд scratch үүсгэх эсэргүүцлийг хэмждэг механик үзүүлэлт юм."},{"en":"secant modulus","mn":"секант модуль","definition":"stress–strain curve-ийн эхлэл ба тодорхой stress point-ийг холбосон шугамын slope, өөрөөр хэлбэл material-ын stiffness-ийг average stress–strain харьцаагаар тодорхойлдог үзүүлэлт юм."},{"en":"secondary permeability","mn":"хоёрдогч нэвчүүлэлт","definition":"intact rock эсвэл primary pores-д нэвчилт бага байхад, fractures, faults, joints, microcracks-ээр ус, шингэн дамжих чадвар нэмэгдсэн нэвчилт юм."},{"en":"seepage failure","mn":"усны шүүрлийн өөрчлөлт","definition":"hydraulic gradient, pore water pressure нэмэгдэх үед resisting shear stress < driving stress болж slope эсвэл structure эвдрэх механизмыг илэрхийлдэг."},{"en":"seepage force","mn":"усны шүүрлийн хүч","definition":"ус нэвчилтэд өртсөн soil particle эсвэл rock block-д hydraulic gradient үүсгэж, shear failure эсвэл internal erosion-д нөлөөлдөг хүч юм."},{"en":"semi-variogram","mn":"семи-вариограм","definition":"зайгаар салсан хоёр цэгийн утгуудын variance-ийг тооцож, spatial continuity буюу геометрийн өөрчлөлт, heterogeneity-г тодорхойлдог."},{"en":"separation fracture","mn":"салангид ан цав","definition":"rock mass-д tensile, bending, or shear stress-д өртөж материал салж, localized gap, crack үүсгэдэг failure mechanism юм."},{"en":"servo-controlled testing machine","mn":"алсын удирдлагат туршилтын машин","definition":"hydraulic or electromechanical actuators ашиглан load, displacement, strain-г өндөр нарийвчлалтайгаар контроллон, stress–strain behavior, creep, cyclic loading, failure characteristics-г туршиж хэмждэг багаж юм."},{"en":"setting load","mn":"тодорхойлсон ачаалал","definition":"instrument, support, or testing system-д applied load-ийн эхний / номинал утга, жишээ нь preload, initial stress, initial force, static load-ийг илэрхийлдэг."},{"en":"setting pressure","mn":"тохируулах даралт","definition":"hydraulic actuator, jack, pore pressure device, or testing apparatus-д predefined буюу номинал pressure утгыг өгч, системийг эхлүүлэх, preload буюу initial stress үүсгэх зориулалттай үзүүлэлт юм."},{"en":"shaking table test","mn":"доргиох тавцангийн туршилт","definition":"Shaking table test нь scaled model эсвэл material sample-г controlled horizontal болон vertical motion-д өртүүлж, seismic response, dynamic behavior, failure mechanisms-г судлах арга юм."},{"en":"shaking test","mn":"доргиох туршилт","definition":"dynamic response, cyclic loading, vibration effects, resonance, or stability-г судлах зорилготой бөгөөд ихэнхдээ earthquake simulation, machinery vibration, or impact studies-д ашиглагддаг."},{"en":"shape factor","mn":"хэлбэрийн хүчин зүйл","definition":"тодорхой cross-section, specimen shape эсвэл support element geometry-г харгалзан stress distribution, load-bearing capacity-г adjust хийх инженерийн параметр юм."},{"en":"shear apparatus","mn":"шилжилтийн багаж","definition":"direct shear test, ring shear test, or triaxial shear test хийхэд ашиглагддаг багаж, материалын shear stress vs shear displacement-г тодорхойлж, cohesion (c) болон internal friction angle (φ)-г тодорхойлдог."},{"en":"shear band","mn":"шилжилтийн цуурал","definition":"stress-д өртсөн материалын хэсэгчилсэн газар shear deformation-д амархан өртөж, localized failure plane үүсгэдэг үзэгдэл юм."},{"en":"shear box","mn":"шилжилтийн хайрцаг","definition":"material sample-г хоёр хэсэгт хувааж, дээш доош хөдөлгөх замаар shear stress vs displacement-г хэмжиж, shear strength, cohesion (c) болон internal friction angle (φ)-г тодорхойлдог багаж юм."},{"en":"shear deformation","mn":"шилжилтийн хэв гажил","definition":"материалд shear stress (хазайлтын хүч) үйлчлэх үед материалын хэлбэр өөрчлөгдөж, нэг давхарга нь нөгөө давхаргатайгаа харьцангуй гулсах деформац юм."},{"en":"shear crack","mn":"шилжилтийн хагарал, ан цав","definition":"материал, бетон, хөрс эсвэл чулуулгад shear stress (хазайлтын хүч)-ийн нөлөөгөөр үүссэн ан цав юм."},{"en":"shear dilation","mn":"шилжилтийн тэлэлт","definition":"хөрс, чулуулга эсвэл мөхлөгт материал shear (хазайлтын) хөдөлгөөнд орох үед эзлэхүүн нь нэмэгдэж тэлэх үзэгдэл юм."},{"en":"shear displacement","mn":"шилжилтийн зай","definition":"материал, хөрс эсвэл чулуулгын хоёр хэсэг shear stress-ийн нөлөөгөөр нэг хавтгай дагуу харьцангуй гулсаж шилжих хөдөлгөөн юм."},{"en":"shear failure","mn":"шилжилтийн эвдрэл","definition":"материал, хөрс эсвэл чулуулгад үйлчилж буй shear stress нь тухайн материалын shear strength-ээс их болох үед гулсаж эвдрэх үзэгдэл юм."},{"en":"shear force","mn":"шилжилтийн хүч","definition":"биетийн нэг хэсгийг нөгөө хэсгээс нь хавтгай дагуу гулсуулж, \"зүсэх\" мэт үйлчлэх хүч юм."},{"en":"shear fracture","mn":"шилжилтийн хагарал","definition":"чулуулаг эсвэл хөрс shear stress (хазайлтын хүч)-ийн нөлөөгөөр нэг хавтгай дагуу гулсаж хагарах эвдрэл юм."},{"en":"shear load","mn":"шилжилтийн ачаа","definition":"хийц эсвэл бүтцийн нэг хэсгийг нөгөө хэсгээс нь хавтгай дагуу гулсуулж салгах чиглэлтэй үйлчилж буй ачаалал (хүч) юм."},{"en":"shear modulus","mn":"шилжилтийн модуль","definition":"материал shear stress (хазайлтын хүч)-ийн нөлөөгөөр shear strain (хазайлтын деформац) үүсэхэд хэр хатуу эсэргүүцэл үзүүлж байгааг илэрхийлэх физик хэмжигдэхүүн юм."},{"en":"shear plane","mn":"шилжилтийн хавтгай","definition":"материалд гулсалт буюу хазайлт үүсэж буй, эсвэл үүсч болзошгүй хавтгай юм."},{"en":"shear stiffness","mn":"шилжилтийн хөшилт","definition":"материалын shear stress-д (хазайлтын хүч) хариу үйлдэл үзүүлж, shear strain-д (хазайлтын деформац) хэр хурдан эсэргүүцэл үзүүлж байгааг илтгэх үзүүлэлт юм."},{"en":"shear strain","mn":"шилжилтийн хэв гажилт","definition":"материалын нэг хэсэг нөгөө хэсгээс хавтгай дагуу харьцангуй гулсах үед үүсэх деформац буюу өнцгийн өөрчлөлт юм."},{"en":"shear strength","mn":"шилжилтийн эсэргүүцэл","definition":"материал, хөрс эсвэл чулуулга нэг хавтгай дагуу эвдрэлгүйгээр тэсвэрлэх хамгийн их shear stress юм."},{"en":"shear stress","mn":"шилжилтийн хүчдэл","definition":"материалын нэг хавтгай дээр ажиллаж байгаа, түүн доторх элементүүдийг харилцан гулсах буюу хазайхад хүргэх хүчийг хэлнэ."},{"en":"shear test","mn":"шилжилтийн туршилт","definition":"материал буюу хөрс/чулуулгын shear strength (хазайлтын бат бөх байдлыг) тодорхойлох туршилт юм."},{"en":"shear wave","mn":"шилжилтийн долгион","definition":"материал (шинжлэх ухаанд ихэвчлэн хөрс, чулуулга) дотроо хавтгай чиглэлд хазайлт үүсгэн дамждаг долгион юм."},{"en":"shearing resistance","mn":"шилжилтийн эсэргүүцэх чанар","definition":"материал буюу хөрс нэг хавтгай дагуу гулсах, нугарах хөдөлгөөнд орж эвдрэхийг эсэргүүцэх хүч юм."},{"en":"shearing strength","mn":"шилжилтийн бат бөх","definition":"материал эсвэл хөрс нэг хавтгай дагуу нугаралгүй, сэлгэгдэлгүйгээр тэсвэрлэх хамгийн их shear stress буюу хазайлтын хүчний хэмжээ юм."},{"en":"shotcrete","mn":"шүршмэл бетон","definition":"цутгамал бетон эсвэл зуурмагийг өндөр даралтаар насосоор шахаж, шууд хананд, налуу талбайд шүрших аргаар суурьлах технологи юм."},{"en":"shrinkage limit","mn":"агшилтын хязгаар","definition":"хөрсний чийгшил багасахад эзлэхүүн нь өөрчлөгдөхгүйгээр хуурай болон нягтарсан байдлын хооронд хадгалагдах хамгийн бага чийгшлийн хэмжээ юм."},{"en":"shrinkage ratio","mn":"агшилтын харьцаа","definition":"чулуулга, хөрс, бетон, шавар гэх мэт материал хуурайших, ус шингээх эсвэл чийг алдах үед багассан эзлэхүүний харьцаа юм."},{"en":"side friction","mn":"хажуугийн үрэлт","definition":"тулгуур, шон, багана эсвэл гүн суурь болон хөрсний/чулуулгын хажуу талд үүсдэг үрэлтийн хүч юм."},{"en":"side pressure","mn":"хажуугийн даралт","definition":"барилгын байгууламж, суурь, ханын эсвэл тулгууртай хавтгайд хавь орчин (хөрс, ус, хий) үүсгэдэг хажуугийн хүч буюу даралт юм."},{"en":"simple shear","mn":"энгийн хазайлтын деформац","definition":"материалд нэг чиглэлд шингэн хөдөлгөөн үүсэхгүйгээр, нэг давхарга нөгөө давхаргад харьцангуй гулсах хэлбэрийн деформац үүсдэг үзэгдэл юм."},{"en":"size effect","mn":"хэмжээний нөлөө","definition":"материалын эсвэл бүтэц, элементийн хэмжээ өөрчлөгдөхөд түүний механик шинж чанар, бат бөх байдал өөрчлөгдөх үзэгдэл юм."},{"en":"slake durability test","mn":"чулуулгийн уусах тэсвэртйн туршилт","definition":"хурц болон сулралтай чулуулгын усанд удаан хугацаагаар нэвтрэхэд хэр удаан тэсвэрлэх, бутарч задрахгүй байж чадахыг тодорхойлох туршилт юм."},{"en":"slenderness ratio","mn":"уян нягтралын харьцаа","definition":"Slenderness ratio гэдэг нь баар, багана эсвэл тулгуурт элементийн урт ба түүний огтлолын хэмжээг харьцуулах харьцаа юм."},{"en":"slide area","mn":"гулсалтын талбай","definition":"Slide area гэдэг нь налуу, хөрс, чулуулга гэх мэт масс нь гулсан, хөдөлсөн эсвэл гулгах магадлалтай бүсийг хэлдэг."},{"en":"slide plane","mn":"гулсалтын хавтгай","definition":"Slide plane гэдэг нь налуу эсвэл сулралтай материал (хөрс, чулуулга, мөс гэх мэт) дагуу гулгах хөдөлгөөн болох хавтгай юм."},{"en":"sliding fracture","mn":"гулсах ан цав","definition":"Slide plane гэдэг нь хөрс, чулуулга, налуу, эсвэл бусад материал дээр гулгах хөдөлгөөн болох хавтгай юм."},{"en":"sliding movement","mn":"гулсах хөдөлгөөн","definition":"Хагарал нь тайрлын дагуу гулсаж үүссэн эвдрэл."},{"en":"slip fracture","mn":"гулсах ан цав","definition":"Slip fracture гэдэг нь чулуулга, металл, эсвэл материалын дотор хүчний нөлөөгөөр нэг хавтгай дагуу гулсаж үүссэн хагарал юм."},{"en":"slip plane","mn":"гулгах талбай","definition":"Slip plane гэдэг нь чулуулгийн давхарга, материал, эсвэл гадаргууд налуу, сулралтай хавтгай, дээр материалууд хөдөлж эсвэл сэлгэгдэж гулсаж болдог хавтгайг хэлдэг."},{"en":"slip surface","mn":"гулгах гадаргуу","definition":"Налуу нуралт гардаг хэв гажилтын гадаргуу."},{"en":"slope instability","mn":"налуугийн тогтворгүй байдал","definition":"Налуу нуралт, гулгалт, creep зэрэг тогтвор алдалт."},{"en":"small-scale yielding","mn":"жижиг-масштабын урсалт","definition":"Fracture mechanics-д crack tip орчим дахь өчүүхэн пластик бүс."},{"en":"smooth wall blasting","mn":"жигд ханатай тэсэлгээ","definition":"Уурхай, туннельд ханыг жигд, тэгш гадаргуутай болгох нарийн тэсэлгээ."},{"en":"soft rock","mn":"зөөлөн чулуу","definition":"UCS багатай (25–50 MPa) үлдэц сул чулуулгийн төрөл."},{"en":"specific gravity","mn":"хатуу хэсгийн нягт","definition":"Материалын нягтыг усны нягтад харьцуулсан утга."},{"en":"specimen","mn":"дээж","definition":"Туршилтад ашиглагдах хөрс/чулуулаг цилиндр, куб биет."},{"en":"split Hopkinson pressure bar (SHPB)","mn":"хуваах Хопкинсийн даралтын баар","definition":"Өндөр хурдны цохилтын шахалтын туршилт (dynamic UCS)."},{"en":"split test","mn":"хуваах туршилт","definition":"Цилиндрийг хажуу тийш шахаж tensile strength (BTS) тодорхойлох туршилт."},{"en":"stability","mn":"тогтворжилт","definition":"Систем, налуу, бүтээц өөрчлөлтгүй хэвээр байх чадвар."},{"en":"stability factor","mn":"тогтворжилтын итгэлцүүр","definition":"Slope safety factor (FoS)-ын нэг төрөл."},{"en":"stable equilibrium","mn":"тогтвортой тэнцвэр","definition":"Систем бага өөрчлөлтөд өөрийн байрлалд буцаж ордог."},{"en":"standard penetration test","mn":"стандарт нэвтрэлтийн туршилт","definition":"Талбайд хийгддэг N-value гаргаж хөрсний нягт, бат бэхийг үнэлдэг туршилт."},{"en":"state of strain","mn":"хэв гажлын төлөв","definition":"Материалын суналт/шахалт/тайрлын deformation-ийн байдал."},{"en":"state of stress","mn":"хүчдэлийн төлөв","definition":"Материал дотор үүсэж буй бүх стрессийн хослол."},{"en":"static friction coefficient","mn":"статик үрэлтийн коеффициент","definition":"Хөдөлгөөн эхлэхээс өмнөх гадаргуун хоорондын хамгийн их friction ratio."},{"en":"static loading test","mn":"статик ачааллын туршилт","definition":"Газар, суурь, шонг тогтвортой ачааллаар турших арга."},{"en":"stiffness","mn":"хатуулаг","definition":"Деформацад эсэргүүцэх материалын чанар (k = F/Δ)."},{"en":"stiffness matrix","mn":"хатуурлын матрикс","definition":"Structural механикийн K матриц, элементүүдийн харилцан хамаарлыг тодорхойлдог."},{"en":"strain","mn":"хэв гажил","definition":"Деформацын хувийн өөрчлөлт: ε = ΔL / L₀."},{"en":"strain analysis","mn":"хэв гажлын шинжилгээ","definition":"Материал дахь deformation patterns-ийг тооцох, strain tensor гаргах үйл явц."},{"en":"ultrasonic wave velocity measurement","mn":"хэт авианы долгионы хурдны хэмжилт","definition":"Чулуулгийн дээжээр хэт авианы P-wave, S-wave нэвтрүүлэх замаар тунадасжилт, трещин, нягтрал, Young's modulus-ийг үнэлдэг туршилт."},{"en":"unconfined compression test","mn":"чөлөөт шахалтын туршилт","definition":"Хөрс, чулуулгийн дээжийг хажуугийн шахалтгүй (σ₃ = 0) шахаж бат бэхийг тодорхойлох лабораторийн туршилт."},{"en":"unconfined compressive strength","mn":"чөлөөт шахалтын бат бэх","definition":"UCT–ийн үр дүнд гардаг хамгийн их шахалтын бат бэх."},{"en":"unconfined swelling test","mn":"чөлөөт хөөлтийн туршилт","definition":"Хөрсийг (ихэвчлэн expansive clay) чөлөөт нөхцөлд усанд дүрж хөөх чадвар (swelling strain, pressure)–ыг хэмжих туршилт."},{"en":"unconsolidated rock","mn":"бэхжүүлээгүй чулуулаг","definition":"Бэхжилтгүй, цементац муу, сул холбоостой чулуулаг (шавар чулуу, элсэн чулууны сул төрлүүд)."},{"en":"uncracked ligament","mn":"цуураагүй холбоос","definition":"Хагаралтай биед байгаа хагараагүй үлдсэн үргэлжилсэн хэсэг, fracture mechanics-д ашиглдаг."},{"en":"uniaxial compression test","mn":"нэг тэнхлэгт шахалтын туршилт","definition":"Дээжийг зөвхөн нэг чиглэлд шахдаг (σ₁ > 0, σ₂ = σ₃ = 0) туршилт. UCS-г тодорхойлдог."},{"en":"uniaxial compressive strength","mn":"Нэг тэнхлэгийн шахалтын бат бэх","definition":"Нэг тэнхлэгийн шахалтын бат бэх (UCS)."},{"en":"uniaxial stress","mn":"нэг тэнхлэгт хүчдэл","definition":"Материал зөвхөн нэг чиглэлд stress-тэй байх байдал."},{"en":"uniaxial tensile strength","mn":"Нэг тэнхлэгийн суналтын бат бэх","definition":"Материал зөвхөн нэг чиглэлд сунгахад даах хамгийн их суналтын бат бэх."},{"en":"uniaxial tension test","mn":"нэг тэнхлэгт суналтын туршилт","definition":"Зөвхөн нэг тэнхлэгт сунгалтын туршилт."},{"en":"unified strength theory","mn":"адилтгасан бат бэхийн онол","definition":"Stress space-д material failure–ийг илэрхийлдэг ерөнхий бат бэхийн онол, MC, DP, Mises гэх мэт загваруудыг нэгтгэдэг."},{"en":"uniform dilatancy","mn":"жигд тэлэлт","definition":"Материал бүх чиглэлд ижил хэмжээний эзэлхүүн нэмэгдэлтэй тэлдэг үзэгдэл."},{"en":"uniformity coefficient","mn":"жигдрэлийн коэффициент","definition":"Хөрсний ширхэглэлийн жигд бус байдлыг илэрхийлнэ: Cu=D10/D60"},{"en":"uniformly distributed load","mn":"жигд тархсан ачаа","definition":"Ачаалал ямар нэг гадаргуу эсвэл дам нуруун дээр тэгш, ижилхэн тархсан байх нөхцөл."},{"en":"unit weight","mn":"нэгж жин","definition":"Материалын нэгж эзэлхүүний жин. Dry, wet, saturated хувилбаруудтай."},{"en":"unloading","mn":"ачааллыг бууруулах","definition":"Ачааллыг бууруулах үед гардаг material response (elastic rebound, hysteresis)."},{"en":"unsaturated","mn":"ханаагүй","definition":"Бүрэн усаар дүүрээгүй хөрсний нөхцөл (Sr < 100%). Чийг, соролт (matric suction)-той."},{"en":"vane shear test","mn":"далбаат шилжээсийн туршилт","definition":"Зөөлөн шаварт талбай дээр in-situ undrained shear strength хэмжих туршилт."},{"en":"vector","mn":"вектор","definition":"Хэмжээ болон чиглэлтэй физик хэмжээ"},{"en":"vector diagram","mn":"вектор диаграмм","definition":"Векторуудыг сум хэлбэрээр чиглэл, хэмжээгээр дүрслэх график."},{"en":"vertical stress","mn":"босоо хүчдэл","definition":"Хөрс/чулуулаг багананы жингээс үүсэх доош чиглэсэн үндсэн хүчдэл. σv=γz"},{"en":"vibrating-wire strain gauge","mn":"доргиолт дамжуулах хэв гажил хэмжигч","definition":"Чичиргээт утсан зарчмаар strain (суналт/шахалт) хэмждэг өндөр нарийвчлалтай мэдрэгч."},{"en":"virtual displacement","mn":"боломжит шилжилт","definition":"Биеийн бодит биш, өөрчлөлт гарсан гэж үзээд бодит дотоод хүчдэлд нийцэж байгаа төсөөллийн displacement (variational mechanics)."},{"en":"virtual work","mn":"боломжит ажил","definition":"Virtual displacement × бодит stress–с гардаг төсөөллийн ажил. Structural mechanics-ийн үндсэн тэгшитгэл."},{"en":"viscoelastic model","mn":"харимхай агилуун загвар","definition":"Материал упруг + зуурамт шинжийг хослуулсан механик загвар."},{"en":"viscoplasticity","mn":"харимхай уян налархай","definition":"Материал цаг хугацаанаас хамаарч plastic deformation үзүүлэх загвар (creep)."},{"en":"viscosity","mn":"зуурамтгай чанар","definition":"Зуурамтгай чанар — шингэн/материал deformation-т эсэргүүцэх чадвар."},{"en":"void ratio","mn":"нүх сүвшилтийн харьцаа","definition":"Хөрсний нүх сүвийн хэмжээ: e=Vs/Vv"},{"en":"volumetric strain","mn":"эзэлхүүний хэв гажил","definition":"Материалын эзэлхүүний харьцангуй өөрчлөлт: εv=εx+εy+εz"},{"en":"water content","mn":"чийгийн хэмжээ","definition":"Хөрсөнд байгаа усны хувь: w=Ws/Ww×100%"},{"en":"wave velocity","mn":"долгионы хурд","definition":"Чулуулгаар нэвтрэх долгионы хурд (P-wave, S-wave). Нягтрал, эвдрэл, уян шинжийг тодорхойлдог."},{"en":"weak plane","mn":"сул хавтан","definition":"Материал доторхи сул, ан цавтай, бага бат бэхтэй давхарга — geotechnical failure-ийн гол эхлэл байдаг."},{"en":"weathering","mn":"өгөршил","definition":"Хөрс, чулуулаг нь ус, салхи, дулаан, хүйтэн, химийн урвал-ын нөлөөгөөр бүтэц нь сулрах, бутрах, нарийн ширхэгтэй болох процессыг хэлнэ."},{"en":"wet unit weight","mn":"чийгтэй нэгж жин","definition":"Хөрс дотор ус орсон үед нэгж эзэлхүүний жин."},{"en":"wettability","mn":"норох чадвар","definition":"Шингэн нь хатуу гадаргуу дээр тархах, норгох чадвар. Геотехникт хөрсний төрөл усанд хэр норохыг хэлнэ."},{"en":"yield","mn":"урсалт","definition":"материалд ачаалал өгөх үед уян (elastic) деформацаас байнгын (plastic) деформац руу шилжих цэг юм."},{"en":"yield condition","mn":"урсалтын нөхцөл","definition":"Материал ямар ачааллын хослолд байнгын хэв гажилт үүсэхийг тодорхойлсон математик нөхцөл."},{"en":"yield criterion","mn":"урсалтын шалгуур","definition":"Материал хэдэн stress state–д хүрэхэд yield үүсэхийг тодорхойлдог дүрэм."},{"en":"yield function","mn":"урсалтын функц","definition":"Yield surface–ийг тодорхойлох математик функц. f(σij)=0"},{"en":"yield limit","mn":"урсалтын хязгаар","definition":"Материал анх удаа пластик хэв гажилт үзүүлэх хамгийн дээд ачаалал."},{"en":"yield load","mn":"урсалтын ачаа","definition":"Объектод yield үүсгэх тодорхой ачааллын хэмжээ."},{"en":"yield locus","mn":"урсалтын локус","definition":"Stress space–д yield үүсэх боломжит бүх цэгийн муруй дүрслэл (2D тохиолдолд)."},{"en":"yield point","mn":"урсалтын цэг","definition":"Stress–strain график дээр пластик шилжилт явагдах тодорхой цэг."},{"en":"yield strain","mn":"урсалтын хэв гажилт","definition":"Yield point-д харгалзах strain. Материалын анхны байнгын хэв гажилт үүсэх strain."},{"en":"yield strength","mn":"урсалтын бат бөх","definition":"Материал yield-д хүрэх үеийн stress-ын утга."},{"en":"yield stress","mn":"урсалтын хүчдэл","definition":"Yield strength-тэй ижил ойлголт. Материал yield эхлүүлэх хүчдэлийн хэмжээ."},{"en":"yield surface","mn":"урсалтын гадаргуу","definition":"3D stress space (σ₁–σ₂–σ₃)–д yield үүсэх боломжит бүх stress-ийн геометр гадаргуу."},{"en":"yield-time diagram","mn":"урсалт-хугацааны диаграм","definition":"Stress болон хугацаа (time-dependent behavior)–ийн хамаарлыг үзүүлдэг график."},{"en":"zone of influence","mn":"нөлөөллийн бүс","definition":"Нөлөөллийн бүс гэдэг нь геотехник, усны нөөц, уурхайн тогтворжилт, инженерийн тооцоонд өргөн хэрэглэгддэг ойлголт."}];

let currentDir = 'both';
let currentSort = 'en-asc';
let activeAlpha = null;
let expandedId = null;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

function getFilteredSorted(q, dir, sort) {
  let items = DATA.filter(d => {
    if (!q) return true;
    const ql = q.toLowerCase();
    if (dir === 'en') return d.en.toLowerCase().includes(ql);
    if (dir === 'mn') return d.mn.toLowerCase().includes(ql) || d.definition.toLowerCase().includes(ql);
    return d.en.toLowerCase().includes(ql) || d.mn.toLowerCase().includes(ql) || d.definition.toLowerCase().includes(ql);
  });
  items = items.slice().sort((a,b) => {
    if (sort === 'mn-asc') return a.mn.localeCompare(b.mn, 'mn');
    return a.en.localeCompare(b.en, 'en');
  });
  return items;
}

function getGroupKey(item, sort) {
  const str = sort === 'mn-asc' ? item.mn : item.en;
  return str[0].toUpperCase();
}

function buildAlphaIndex(items, sort) {
  const letters = [...new Set(items.map(i => getGroupKey(i, sort)))].sort();
  const el = document.getElementById('alphaIndex');
  el.innerHTML = letters.map(l =>
    `<button class="alpha-btn${activeAlpha === l ? ' active' : ''}" data-letter="${l}">${l}</button>`
  ).join('');
  el.querySelectorAll('.alpha-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const letter = btn.dataset.letter;
      if (activeAlpha === letter) {
        activeAlpha = null;
      } else {
        activeAlpha = letter;
        document.getElementById(`group-${letter}`)?.scrollIntoView({behavior:'smooth', block:'start'});
      }
      render();
    });
  });
}

function render() {
  const q = document.getElementById('searchInput').value.trim();
  let items = getFilteredSorted(q, currentDir, currentSort);

  // Alpha filter
  if (activeAlpha && !q) {
    items = items.filter(i => getGroupKey(i, currentSort) === activeAlpha);
  }

  document.getElementById('resultCount').textContent = `${items.length} үр дүн`;
  document.getElementById('totalCount').textContent = DATA.length;

  const container = document.getElementById('glossaryContainer');
  const noResults = document.getElementById('noResults');

  if (items.length === 0) {
    container.innerHTML = '';
    noResults.style.display = 'block';
    buildAlphaIndex([], currentSort);
    return;
  }
  noResults.style.display = 'none';

  // Group by letter
  const groups = {};
  items.forEach(item => {
    const key = getGroupKey(item, currentSort);
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  buildAlphaIndex(getFilteredSorted('', currentDir, currentSort), currentSort);

  let html = '';
  Object.keys(groups).sort().forEach(letter => {
    html += `<div class="letter-group" id="group-${letter}">`;
    if (!q) {
      html += `<div class="letter-heading"><span class="letter-char">${letter}</span><div class="letter-line"></div></div>`;
    }
    groups[letter].forEach((item, idx) => {
      const id = `entry-${letter}-${idx}`;
      const isExp = expandedId === id;
      const enH = highlight(item.en, q);
      const mnH = highlight(item.mn, q);
      const defH = highlight(item.definition, q);
      html += `
        <div class="entry${isExp ? ' expanded' : ''}" id="${id}" data-id="${id}">
          <button class="copy-btn" data-en="${esc(item.en)}" data-mn="${esc(item.mn)}">📋 хуулах</button>
          <div class="entry-top">
            <div>
              <span class="tag tag-en">EN</span>
              <div class="term-en">${enH}</div>
            </div>
            <div style="text-align:right">
              <span class="tag tag-mn">МН</span>
              <div class="term-mn">${mnH}</div>
            </div>
          </div>
          <div class="entry-def">${defH}</div>
        </div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;

  // Events
  container.querySelectorAll('.entry').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('copy-btn')) return;
      const id = el.dataset.id;
      expandedId = expandedId === id ? null : id;
      render();
    });
  });

  container.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const text = `${btn.dataset.en} — ${btn.dataset.mn}`;
      navigator.clipboard?.writeText(text);
      btn.textContent = '✓ хуулагдлаа';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 хуулах';
        btn.classList.remove('copied');
      }, 1500);
    });
  });
}

// Controls
document.getElementById('searchInput').addEventListener('input', () => {
  activeAlpha = null;
  expandedId = null;
  render();
});

document.querySelectorAll('.dir-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDir = btn.dataset.dir;
    activeAlpha = null;
    render();
  });
});

document.getElementById('sortSelect').addEventListener('change', (e) => {
  currentSort = e.target.value;
  activeAlpha = null;
  render();
});

render();
</script>
</body>
</html>
